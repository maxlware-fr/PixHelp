<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <img id="logo" src="../icons/icon_active.png" alt="Logo" class="rotate-animation">
    <p class="description">
      PixHelp vous aide à trouver des ressources pédagogiques pour les épreuves Pix.<br>
      Cette extension n’est pas officielle et doit être utilisée uniquement dans le cadre autorisé.
    </p>
    <p id="status">Statut : <span id="active-status">...</span></p>
    <div class="buttons">
      <button id="btn-pix">Pix</button>
      <button id="btn-dev">Site du développeur</button>
      <button id="btn-github">GitHub</button>
      <button id="btn-prof">Professeur</button>
    </div>
    <p class="version">Version 1.0.0</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
