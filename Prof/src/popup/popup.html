<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <img id="logo" src="icons/icon_prof.png" alt="Logo" class="rotate-animation">
    <p class="description">
      PixHelp Prof est une extension destinée aux professeurs pour gérer et surveiller l'utilisation de Pix par leurs élèves.<br>
      Elle offre des fonctionnalités de contrôle et de suivi pour assurer une utilisation optimale de la plateforme Pix en classe.
    </p>
    <p id="status">Statut : <span id="active-status">...</span></p>
    <div class="buttons">
      <button id="btn-pix">Pix Orga</button>
      <button id="btn-prof" style="display: none;">👨‍🏫 Tableau de bord prof</button>
      <button id="btn-dev">Site du développeur</button>
      <button id="btn-github">GitHub</button>
    </div>
    <p class="version">Version 1.0.0</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
